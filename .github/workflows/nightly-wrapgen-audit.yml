# Nightly wrapgen "golden" audit: pinned raylib 6.0 raylib.h → wrapgen → SHA256 compare (no PR noise).
# Manual: Actions → "Nightly wrapgen golden audit" → Run workflow
name: Nightly wrapgen golden audit

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  golden-raylib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Golden audit (pinned raylib 6.0 + checksums)
        run: bash scripts/wrapgen-golden-audit.sh
