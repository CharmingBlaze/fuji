# Jobs populate internal/embed/<GOOS>/<GOARCH>/ (clang [+ lld on Windows], libfuji_runtime.a),
# then build with -tags release. Triggered by version tags.

name: Release

on:
  push:
    tags:
      - "v*"

env:
  CGO_ENABLED: "0"

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Install LLVM
        run: choco install llvm -y

      - name: Add LLVM to PATH
        run: echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Build C runtime
        run: |
          New-Item -ItemType Directory -Force runtime\obj_win | Out-Null
          clang -c runtime\src\value.c        -O2 -std=c11 -Iruntime\src -D_AMD64_=1 -o runtime\obj_win\value.o
          clang -c runtime\src\object.c       -O2 -std=c11 -Iruntime\src -D_AMD64_=1 -o runtime\obj_win\object.o
          clang -c runtime\src\gc.c           -O2 -std=c11 -Iruntime\src -D_AMD64_=1 -o runtime\obj_win\gc.o
          clang -c runtime\src\fuji_runtime.c -O2 -std=c11 -Iruntime\src -D_AMD64_=1 -o runtime\obj_win\fuji_runtime.o
          llvm-ar rcs runtime\libfuji_runtime.a runtime\obj_win\value.o runtime\obj_win\object.o runtime\obj_win\gc.o runtime\obj_win\fuji_runtime.o

      - name: Populate embed/windows/amd64
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          $clang = Join-Path $llvmBin "clang.exe"
          if (!(Test-Path $clang)) { throw "missing $clang" }
          $lld = Join-Path $llvmBin "lld.exe"
          if (!(Test-Path $lld)) { throw "missing $lld" }
          $llc = $null
          foreach ($n in @("llc.exe", "llc-20.exe", "llc-19.exe", "llc-18.exe", "llc-17.exe")) {
            $c = Join-Path $llvmBin $n
            if (Test-Path $c) { $llc = $c; break }
          }
          if (-not $llc) {
            $found = Get-ChildItem -Path $llvmBin -Filter "llc*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $llc = $found.FullName }
          }
          if (-not $llc) { throw "no llc*.exe under $llvmBin (LLVM package layout changed)" }
          New-Item -ItemType Directory -Force internal\embed\windows\amd64 | Out-Null
          Copy-Item $clang internal\embed\windows\amd64\clang.exe
          Copy-Item $llc   internal\embed\windows\amd64\llc.exe
          Copy-Item $lld   internal\embed\windows\amd64\lld.exe
          Copy-Item runtime\libfuji_runtime.a internal\embed\windows\amd64\

      - name: Build fuji.exe
        run: go build -trimpath -tags release -ldflags="-s -w" -o fuji-windows-amd64.exe ./cmd/fuji

      - name: Build fujiwrap.exe
        run: go build -trimpath -tags release -ldflags="-s -w" -o fujiwrap-windows-amd64.exe ./cmd/wrapgen

      - name: Test
        run: |
          .\fuji-windows-amd64.exe version
          .\fuji-windows-amd64.exe build tests\hello.fuji -o hello.exe
          .\hello.exe
          .\fuji-windows-amd64.exe build tests\gc_shadow_multi_return_pop.fuji -o gc_shadow.exe
          .\gc_shadow.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            fuji-windows-amd64.exe
            fujiwrap-windows-amd64.exe

  linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm

      - name: Build C runtime
        shell: bash
        run: |
          set -euo pipefail
          CLANG_BIN="$(command -v clang-20 || command -v clang-19 || command -v clang-18 || command -v clang || command -v cc || true)"
          LLVM_AR_BIN="$(command -v llvm-ar-20 || command -v llvm-ar-19 || command -v llvm-ar-18 || command -v llvm-ar || command -v ar || true)"
          if [[ -z "$CLANG_BIN" ]]; then
            echo "no clang/cc found on PATH" >&2
            exit 1
          fi
          if [[ -z "$LLVM_AR_BIN" ]]; then
            echo "no llvm-ar/ar found on PATH" >&2
            exit 1
          fi
          mkdir -p runtime/obj_linux
          "$CLANG_BIN" -c runtime/src/value.c        -O2 -std=c11 -Iruntime/src -o runtime/obj_linux/value.o
          "$CLANG_BIN" -c runtime/src/object.c       -O2 -std=c11 -Iruntime/src -o runtime/obj_linux/object.o
          "$CLANG_BIN" -c runtime/src/gc.c           -O2 -std=c11 -Iruntime/src -o runtime/obj_linux/gc.o
          "$CLANG_BIN" -c runtime/src/fuji_runtime.c -O2 -std=c11 -Iruntime/src -o runtime/obj_linux/fuji_runtime.o
          "$LLVM_AR_BIN" rcs runtime/libfuji_runtime.a runtime/obj_linux/*.o

      - name: Populate embed/linux/amd64
        shell: bash
        run: |
          set -euo pipefail
          CLANG_BIN="$(command -v clang-20 || command -v clang-19 || command -v clang-18 || command -v clang || command -v cc || true)"
          LLC_BIN="$(command -v llc-20 || command -v llc-19 || command -v llc-18 || command -v llc || true)"
          if [[ -z "$CLANG_BIN" ]]; then
            echo "no clang/cc found on PATH" >&2
            exit 1
          fi
          if [[ -z "$LLC_BIN" ]]; then
            echo "no llc found on PATH" >&2
            exit 1
          fi
          mkdir -p internal/embed/linux/amd64
          cp "$CLANG_BIN"                internal/embed/linux/amd64/clang
          cp "$LLC_BIN"                  internal/embed/linux/amd64/llc
          cp runtime/libfuji_runtime.a internal/embed/linux/amd64/

      - name: Build fuji
        run: go build -trimpath -tags release -ldflags="-s -w" -o fuji-linux-amd64 ./cmd/fuji

      - name: Build fujiwrap
        run: go build -trimpath -tags release -ldflags="-s -w" -o fujiwrap-linux-amd64 ./cmd/wrapgen

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          chmod +x fuji-linux-amd64 fujiwrap-linux-amd64
          ./fuji-linux-amd64 version
          ./fuji-linux-amd64 build tests/hello.fuji -o hello
          ./hello
          ./fuji-linux-amd64 build tests/gc_shadow_multi_return_pop.fuji -o gc_shadow
          ./gc_shadow

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: |
            fuji-linux-amd64
            fujiwrap-linux-amd64

  linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm

      - name: Build C runtime
        shell: bash
        run: |
          set -euo pipefail
          CLANG_BIN="$(command -v clang-20 || command -v clang-19 || command -v clang-18 || command -v clang || command -v cc || true)"
          LLVM_AR_BIN="$(command -v llvm-ar-20 || command -v llvm-ar-19 || command -v llvm-ar-18 || command -v llvm-ar || command -v ar || true)"
          if [[ -z "$CLANG_BIN" ]]; then
            echo "no clang/cc found on PATH" >&2
            exit 1
          fi
          if [[ -z "$LLVM_AR_BIN" ]]; then
            echo "no llvm-ar/ar found on PATH" >&2
            exit 1
          fi
          mkdir -p runtime/obj_linux_arm64
          "$CLANG_BIN" -c runtime/src/value.c        -O2 -std=c11 -Iruntime/src -o runtime/obj_linux_arm64/value.o
          "$CLANG_BIN" -c runtime/src/object.c       -O2 -std=c11 -Iruntime/src -o runtime/obj_linux_arm64/object.o
          "$CLANG_BIN" -c runtime/src/gc.c           -O2 -std=c11 -Iruntime/src -o runtime/obj_linux_arm64/gc.o
          "$CLANG_BIN" -c runtime/src/fuji_runtime.c -O2 -std=c11 -Iruntime/src -o runtime/obj_linux_arm64/fuji_runtime.o
          "$LLVM_AR_BIN" rcs runtime/libfuji_runtime.a runtime/obj_linux_arm64/*.o

      - name: Populate embed/linux/arm64
        shell: bash
        run: |
          set -euo pipefail
          CLANG_BIN="$(command -v clang-20 || command -v clang-19 || command -v clang-18 || command -v clang || command -v cc || true)"
          LLC_BIN="$(command -v llc-20 || command -v llc-19 || command -v llc-18 || command -v llc || true)"
          if [[ -z "$CLANG_BIN" ]]; then
            echo "no clang/cc found on PATH" >&2
            exit 1
          fi
          if [[ -z "$LLC_BIN" ]]; then
            echo "no llc found on PATH" >&2
            exit 1
          fi
          mkdir -p internal/embed/linux/arm64
          cp "$CLANG_BIN"                internal/embed/linux/arm64/clang
          cp "$LLC_BIN"                  internal/embed/linux/arm64/llc
          cp runtime/libfuji_runtime.a internal/embed/linux/arm64/

      - name: Build fuji
        run: GOARCH=arm64 go build -trimpath -tags release -ldflags="-s -w" -o fuji-linux-arm64 ./cmd/fuji

      - name: Build fujiwrap
        run: go build -trimpath -tags release -ldflags="-s -w" -o fujiwrap-linux-arm64 ./cmd/wrapgen

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          chmod +x fuji-linux-arm64 fujiwrap-linux-arm64
          ./fuji-linux-arm64 version
          ./fuji-linux-arm64 build tests/hello.fuji -o hello
          ./hello
          ./fuji-linux-arm64 build tests/gc_shadow_multi_return_pop.fuji -o gc_shadow
          ./gc_shadow

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: |
            fuji-linux-arm64
            fujiwrap-linux-arm64

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Install LLVM
        run: |
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - name: Build C runtime — amd64
        run: |
          CLANG_BIN="$(xcrun --sdk macosx --find clang)"
          SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          mkdir -p runtime/obj_macos_amd64
          "$CLANG_BIN" -c runtime/src/value.c        -O2 -std=c11 -Iruntime/src -isysroot "$SDKROOT" -arch x86_64 -o runtime/obj_macos_amd64/value.o
          "$CLANG_BIN" -c runtime/src/object.c       -O2 -std=c11 -Iruntime/src -isysroot "$SDKROOT" -arch x86_64 -o runtime/obj_macos_amd64/object.o
          "$CLANG_BIN" -c runtime/src/gc.c           -O2 -std=c11 -Iruntime/src -isysroot "$SDKROOT" -arch x86_64 -o runtime/obj_macos_amd64/gc.o
          "$CLANG_BIN" -c runtime/src/fuji_runtime.c -O2 -std=c11 -Iruntime/src -isysroot "$SDKROOT" -arch x86_64 -o runtime/obj_macos_amd64/fuji_runtime.o
          llvm-ar rcs runtime/libfuji_runtime_amd64.a runtime/obj_macos_amd64/*.o

      - name: Build C runtime — arm64
        run: |
          CLANG_BIN="$(xcrun --sdk macosx --find clang)"
          SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          mkdir -p runtime/obj_macos_arm64
          "$CLANG_BIN" -c runtime/src/value.c        -O2 -std=c11 -Iruntime/src -isysroot "$SDKROOT" -arch arm64 -o runtime/obj_macos_arm64/value.o
          "$CLANG_BIN" -c runtime/src/object.c       -O2 -std=c11 -Iruntime/src -isysroot "$SDKROOT" -arch arm64 -o runtime/obj_macos_arm64/object.o
          "$CLANG_BIN" -c runtime/src/gc.c           -O2 -std=c11 -Iruntime/src -isysroot "$SDKROOT" -arch arm64 -o runtime/obj_macos_arm64/gc.o
          "$CLANG_BIN" -c runtime/src/fuji_runtime.c -O2 -std=c11 -Iruntime/src -isysroot "$SDKROOT" -arch arm64 -o runtime/obj_macos_arm64/fuji_runtime.o
          llvm-ar rcs runtime/libfuji_runtime_arm64.a runtime/obj_macos_arm64/*.o

      - name: Populate embed/darwin
        run: |
          mkdir -p internal/embed/darwin/amd64
          mkdir -p internal/embed/darwin/arm64
          cp "$(which clang)"                       internal/embed/darwin/amd64/clang
          cp "$(which clang)"                       internal/embed/darwin/arm64/clang
          cp "$(which llc)"                         internal/embed/darwin/amd64/llc
          cp "$(which llc)"                         internal/embed/darwin/arm64/llc
          cp runtime/libfuji_runtime_amd64.a      internal/embed/darwin/amd64/libfuji_runtime.a
          cp runtime/libfuji_runtime_arm64.a      internal/embed/darwin/arm64/libfuji_runtime.a

      - name: Build fuji — amd64
        run: GOARCH=amd64 go build -trimpath -tags release -ldflags="-s -w" -o fuji-darwin-amd64 ./cmd/fuji

      - name: Build fuji — arm64
        run: GOARCH=arm64 go build -trimpath -tags release -ldflags="-s -w" -o fuji-darwin-arm64 ./cmd/fuji

      - name: Build fujiwrap — arm64 (host)
        run: go build -trimpath -tags release -ldflags="-s -w" -o fujiwrap-darwin-arm64 ./cmd/wrapgen

      - name: Build fujiwrap — amd64 (cross)
        run: GOOS=darwin GOARCH=amd64 go build -trimpath -tags release -ldflags="-s -w" -o fujiwrap-darwin-amd64 ./cmd/wrapgen

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          chmod +x fuji-darwin-arm64 fuji-darwin-amd64 fujiwrap-darwin-arm64 fujiwrap-darwin-amd64
          ./fuji-darwin-arm64 version
          ./fuji-darwin-arm64 build tests/hello.fuji -o hello
          ./hello
          ./fuji-darwin-arm64 build tests/gc_shadow_multi_return_pop.fuji -o gc_shadow
          ./gc_shadow

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            fuji-darwin-amd64
            fuji-darwin-arm64
            fujiwrap-darwin-amd64
            fujiwrap-darwin-arm64

  publish:
    needs: [windows, linux-amd64, linux-arm64, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Vendor raylib 5.0 (per platform) for SDK zips
        run: |
          chmod +x scripts/vendor-raylib-stage.sh
          bash scripts/vendor-raylib-stage.sh "${GITHUB_WORKSPACE}/.raylib-vendor"

      - name: Package offline SDK zip (per platform)
        env:
          RAYLIB_VENDOR_ROOT: ${{ github.workspace }}/.raylib-vendor
        run: |
          chmod +x scripts/package-release-sdk.sh
          bash scripts/package-release-sdk.sh "${{ github.ref_name }}" artifacts sdk-zips
          ls -la sdk-zips

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/windows/fuji-windows-amd64.exe
            artifacts/windows/fujiwrap-windows-amd64.exe
            artifacts/linux-amd64/fuji-linux-amd64
            artifacts/linux-amd64/fujiwrap-linux-amd64
            artifacts/linux-arm64/fuji-linux-arm64
            artifacts/linux-arm64/fujiwrap-linux-arm64
            artifacts/macos/fuji-darwin-amd64
            artifacts/macos/fuji-darwin-arm64
            artifacts/macos/fujiwrap-darwin-amd64
            artifacts/macos/fujiwrap-darwin-arm64
            sdk-zips/*.zip
          body: |
            ## Fuji Programming Language

            ### Offline SDK zips (**recommended**)

            **Windows**, **Linux** (x64 + ARM64), and **macOS** (Intel + Apple Silicon): one zip per CPU OS pair. Each **`fuji-*-sdk-*.zip`** is self-contained:

            | Archive | Contents |
            |---------|----------|
            | **`fuji-${{ github.ref_name }}-sdk-windows-amd64.zip`** | `fuji.exe`, `fujiwrap.exe`, `stdlib/`, `docs/`, root `*.md`, **full `wrappers/` (raylib + glue)**, **`third_party/raylib_static/stage`** (headers, `libraylib.a`, `raylib.dll`), `examples/`, `SDK_README.txt` |
            | **`fuji-${{ github.ref_name }}-sdk-linux-amd64.zip`** | same layout (POSIX binaries) |
            | **`fuji-${{ github.ref_name }}-sdk-linux-arm64.zip`** | same toolchain + docs + wrappers; **no upstream raylib ARM64 prebuild** — see `third_party/raylib_static/stage/README-Fuji.txt` and install system raylib or build from source |
            | **`fuji-${{ github.ref_name }}-sdk-darwin-amd64.zip`** | Intel macOS |
            | **`fuji-${{ github.ref_name }}-sdk-darwin-arm64.zip`** | Apple Silicon |

            Extract anywhere; keep **`stdlib/`** next to **`fuji`**. Embedded **Clang + llc + runtime** (and Windows `lld`) ship **inside** the `fuji` binary — **no LLVM install** and **`fuji` does not download anything from the internet** when you compile; tools unpack from the binary to a **local temp directory** on first use only. Raylib (where included in the zip) is already on disk under **`third_party/raylib_static/stage/`**. Wrapping/linking **other** external C libs still uses libraries you provide (see `docs/wrappers.md` in the zip).

            ### Loose binaries only

            | Platform | Compiler | Wrapper Tool |
            |----------|----------|--------------|
            | Windows 64-bit | fuji-windows-amd64.exe | fujiwrap-windows-amd64.exe |
            | Linux 64-bit | fuji-linux-amd64 | fujiwrap-linux-amd64 |
            | Linux ARM64 | fuji-linux-arm64 | fujiwrap-linux-arm64 |
            | macOS Intel | fuji-darwin-amd64 | fujiwrap-darwin-amd64 |
            | macOS Apple Silicon | fuji-darwin-arm64 | fujiwrap-darwin-arm64 |

            ### Windows

            ```powershell
            fuji-windows-amd64.exe build hello.fuji -o hello.exe
            .\hello.exe
            ```

            ### Linux

            ```bash
            chmod +x fuji-linux-amd64
            ./fuji-linux-amd64 build hello.fuji -o hello
            ./hello
            ```

            ### macOS

            ```bash
            chmod +x fuji-darwin-arm64
            ./fuji-darwin-arm64 build hello.fuji -o hello
            ./hello
            ```
