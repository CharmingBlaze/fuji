# Each job populates internal/fujihome/bundled/<GOOS>/<GOARCH>/ (llc, lld, libfuji_runtime.a),
# then builds fuji with -tags release so those artifacts are embedded. Triggered by version tags.

name: Release

on:
  push:
    tags:
      - "v*"

# Release fuji binaries are pure Go + embed; CGo LLVM is optional (see CONTRIBUTING.md).
env:
  CGO_ENABLED: "0"

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install LLVM 14
        run: choco install llvm --version=14.0.6 -y

      - name: Add LLVM to PATH
        run: echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Build C runtime
        shell: cmd
        run: |
          cd runtime\src
          clang -c -O2 -std=c11 -I. gc.c object.c value.c fuji_runtime.c
          llvm-ar rcs ..\libfuji_runtime.a gc.obj object.obj value.obj fuji_runtime.obj

      - name: Populate bundled/windows/amd64
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force internal/fujihome/bundled/windows/amd64 | Out-Null
          Copy-Item "C:\Program Files\LLVM\bin\llc.exe" internal/fujihome/bundled/windows/amd64/
          Copy-Item "C:\Program Files\LLVM\bin\lld.exe" internal/fujihome/bundled/windows/amd64/
          Copy-Item runtime/libfuji_runtime.a internal/fujihome/bundled/windows/amd64/

      - name: Build fuji (embedded toolchain)
        run: go build -trimpath -tags release -ldflags="-s -w" -o fuji-windows-amd64.exe ./cmd/fuji

      - uses: actions/upload-artifact@v4
        with:
          name: fuji-windows-amd64
          path: fuji-windows-amd64.exe

  release-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install LLVM 14
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-14 clang-14 lld-14

      - name: Build C runtime
        run: bash scripts/build-runtime.sh

      - name: Populate bundled/linux/amd64
        run: |
          mkdir -p internal/fujihome/bundled/linux/amd64
          cp "$(command -v llc-14)" internal/fujihome/bundled/linux/amd64/llc
          cp "$(command -v lld-14)" internal/fujihome/bundled/linux/amd64/lld
          cp runtime/libfuji_runtime.a internal/fujihome/bundled/linux/amd64/

      - name: Build fuji (embedded toolchain)
        run: go build -trimpath -tags release -ldflags="-s -w" -o fuji-linux-amd64 ./cmd/fuji

      - uses: actions/upload-artifact@v4
        with:
          name: fuji-linux-amd64
          path: fuji-linux-amd64

  release-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install LLVM 14
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-14 clang-14 lld-14

      - name: Build C runtime
        run: bash scripts/build-runtime.sh

      - name: Populate bundled/linux/arm64
        run: |
          mkdir -p internal/fujihome/bundled/linux/arm64
          cp "$(command -v llc-14)" internal/fujihome/bundled/linux/arm64/llc
          cp "$(command -v lld-14)" internal/fujihome/bundled/linux/arm64/lld
          cp runtime/libfuji_runtime.a internal/fujihome/bundled/linux/arm64/

      - name: Build fuji (embedded toolchain)
        run: go build -trimpath -tags release -ldflags="-s -w" -o fuji-linux-arm64 ./cmd/fuji

      - uses: actions/upload-artifact@v4
        with:
          name: fuji-linux-arm64
          path: fuji-linux-arm64

  release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install LLVM 14
        run: |
          brew install llvm@14
          echo "$(brew --prefix llvm@14)/bin" >> $GITHUB_PATH

      - name: Build C runtime (x86_64 and arm64)
        run: |
          set -e
          LLVM_PREFIX="$(brew --prefix llvm@14)"
          export PATH="$LLVM_PREFIX/bin:$PATH"
          cd runtime/src
          for arch in amd64 arm64; do
            if [ "$arch" = "amd64" ]; then
              target="x86_64-apple-macos11"
            else
              target="arm64-apple-macos11"
            fi
            rm -f *.o
            clang -c -O2 -std=c11 -I. -target "$target" gc.c object.c value.c fuji_runtime.c
            llvm-ar rcs "../libfuji_runtime_${arch}.a" *.o
          done

      - name: Populate bundled/darwin/amd64 and darwin/arm64
        run: |
          set -e
          LLVM_PREFIX="$(brew --prefix llvm@14)"
          LLVM_BIN="$LLVM_PREFIX/bin"
          mkdir -p internal/fujihome/bundled/darwin/amd64 internal/fujihome/bundled/darwin/arm64
          cp "$LLVM_BIN/llc" internal/fujihome/bundled/darwin/amd64/
          cp "$LLVM_BIN/lld" internal/fujihome/bundled/darwin/amd64/
          cp runtime/libfuji_runtime_amd64.a internal/fujihome/bundled/darwin/amd64/libfuji_runtime.a
          cp "$LLVM_BIN/llc" internal/fujihome/bundled/darwin/arm64/
          cp "$LLVM_BIN/lld" internal/fujihome/bundled/darwin/arm64/
          cp runtime/libfuji_runtime_arm64.a internal/fujihome/bundled/darwin/arm64/libfuji_runtime.a

      - name: Build fuji darwin amd64
        env:
          GOARCH: amd64
        run: go build -trimpath -tags release -ldflags="-s -w" -o fuji-darwin-amd64 ./cmd/fuji

      - name: Build fuji darwin arm64
        env:
          GOARCH: arm64
        run: go build -trimpath -tags release -ldflags="-s -w" -o fuji-darwin-arm64 ./cmd/fuji

      - uses: actions/upload-artifact@v4
        with:
          name: fuji-macos
          path: |
            fuji-darwin-amd64
            fuji-darwin-arm64

  publish-release:
    needs:
      - release-windows
      - release-linux-amd64
      - release-linux-arm64
      - release-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/fuji-windows-amd64/fuji-windows-amd64.exe
            artifacts/fuji-linux-amd64/fuji-linux-amd64
            artifacts/fuji-linux-arm64/fuji-linux-arm64
            artifacts/fuji-macos/fuji-darwin-amd64
            artifacts/fuji-macos/fuji-darwin-arm64
          generate_release_notes: true
          body: |
            ## Self-contained Fuji (embedded LLVM + Fuji runtime)

            These binaries embed **llc**, **lld**, and **libfuji_runtime.a** for the matching OS/arch. No separate LLVM install is required to run `fuji build` / `fuji run`.

            | Platform | Download |
            |----------|----------|
            | Windows x86-64 | `fuji-windows-amd64.exe` |
            | Linux x86-64 | `fuji-linux-amd64` |
            | Linux arm64 | `fuji-linux-arm64` |
            | macOS x86-64 | `fuji-darwin-amd64` |
            | macOS Apple Silicon | `fuji-darwin-arm64` |

            ### Windows

            ```bat
            fuji-windows-amd64.exe build tests\hello.fuji -o hello.exe
            hello.exe
            ```

            ### Linux

            ```bash
            chmod +x fuji-linux-amd64
            ./fuji-linux-amd64 build tests/hello.fuji -o hello
            ./hello
            ```

            On **arm64** machines use `fuji-linux-arm64` the same way.

            ### macOS

            ```bash
            chmod +x fuji-darwin-arm64
            ./fuji-darwin-arm64 build tests/hello.fuji -o hello
            ./hello
            ```

            On Intel Macs use `fuji-darwin-amd64` instead.
