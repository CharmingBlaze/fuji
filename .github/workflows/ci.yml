name: CI

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
      FUJI_SKIP_TOOLCHAIN_EXTRACT: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 llvm-18 build-essential

      - name: Build C runtime
        run: |
          mkdir -p runtime/obj
          clang-18 -c runtime/src/value.c        -O2 -std=c11 -Iruntime/src -o runtime/obj/value.o
          clang-18 -c runtime/src/object.c       -O2 -std=c11 -Iruntime/src -o runtime/obj/object.o
          clang-18 -c runtime/src/gc.c           -O2 -std=c11 -Iruntime/src -o runtime/obj/gc.o
          clang-18 -c runtime/src/fuji_runtime.c -O2 -std=c11 -Iruntime/src -o runtime/obj/fuji_runtime.o
          llvm-ar-18 rcs runtime/libfuji_runtime.a runtime/obj/value.o runtime/obj/object.o runtime/obj/gc.o runtime/obj/fuji_runtime.o

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./... -count=1

      - name: Build CLIs
        run: |
          go build -trimpath -o /tmp/fuji ./cmd/fuji
          go build -trimpath -o /tmp/fujiwrap ./cmd/wrapgen
          go build -trimpath -o /tmp/wrapgen ./cmd/wrapgen

      - name: fuji fmt --check
        run: /tmp/fuji fmt --check ./...

      - name: fuji check (sema, no LLVM)
        run: |
          /tmp/fuji check tests/hello.fuji
          if /tmp/fuji check tests/undefined_var.fuji 2>/dev/null; then echo "expected check to fail"; exit 1; fi
          if /tmp/fuji check tests/sema_errors.fuji 2>/dev/null; then echo "expected sema_errors check to fail"; exit 1; fi
          if /tmp/fuji check tests/struct_typo_test.fuji 2>/dev/null; then echo "expected struct field typo check to fail"; exit 1; fi

      - name: Native smoke (fuji build)
        run: |
          /tmp/fuji build tests/smoke_native.fuji -o /tmp/smoke_native
          test -x /tmp/smoke_native
          /tmp/smoke_native | head -n 5
          /tmp/fuji build tests/for_of_pairs.fuji -o /tmp/for_of_pairs
          test -x /tmp/for_of_pairs
          /tmp/for_of_pairs | head -n 10
          /tmp/fuji build tests/nullish_assign.fuji -o /tmp/nullish_assign
          /tmp/nullish_assign | head -n 5
          /tmp/fuji build tests/for_of_dynamic_range.fuji -o /tmp/for_of_dynamic_range
          /tmp/for_of_dynamic_range | head -n 5
          /tmp/fuji build tests/defer_test.fuji -o /tmp/defer_test
          /tmp/defer_test | head -n 5
          /tmp/fuji build tests/assert_string_eq.fuji -o /tmp/assert_string_eq
          /tmp/assert_string_eq | head -n 5
          /tmp/fuji build tests/unary_plus_fold.fuji -o /tmp/unary_plus_fold
          /tmp/unary_plus_fold | head -n 5
          /tmp/fuji build tests/gc_shadow_multi_return_pop.fuji -o /tmp/gc_shadow_multi_return_pop
          /tmp/gc_shadow_multi_return_pop | head -n 5
          /tmp/fuji build tests/gc_control_test.fuji -o /tmp/gc_control_test
          /tmp/gc_control_test | head -n 5
          /tmp/fuji run tests/vec3_test.fuji
          /tmp/fuji run tests/vec3_math_lerp_direct_test.fuji
          /tmp/fuji run tests/math_lerp_member_test.fuji
          /tmp/fuji run tests/array_push_growth_test.fuji
          /tmp/fuji run tests/multi_while_flow_test.fuji
          /tmp/fuji build --debug tests/hello.fuji -o /tmp/hello_debug
          test -x /tmp/hello_debug

      - name: GC soak (serialized, time-bounded)
        run: |
          timeout 90s /tmp/fuji run tests/gc_pressure_expr.fuji
          timeout 90s /tmp/fuji run tests/globals_perf.fuji
          timeout 90s /tmp/fuji run tests/gc_soak.fuji
          timeout 120s /tmp/fuji run --no-opt tests/nursery_test.fuji
          timeout 120s /tmp/fuji run --no-opt tests/incremental_gc_test.fuji

      - name: Stress smoke (time-bounded)
        run: |
          timeout 90s /tmp/fuji run tests/stress/stress_mixed_alloc.fuji
          timeout 120s /tmp/fuji run --no-opt tests/stress/large_game_sim.fuji

      - name: Parser fuzz (smoke, 5s)
        run: go test ./internal/parser -fuzz=FuzzParse -fuzztime=5s -count=1

      - name: Wrapgen Raylib + link smoke
        env:
          FUJI_BIN: /tmp/fuji
        run: bash scripts/ci-wrapgen-raylib.sh
